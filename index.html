<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>test</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1"></script>
  <style>
    /* --- 全体のリセットと背景設定 --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
      background: linear-gradient(135deg, #f4f7fc 0%, #eef2f9 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* --- シャボン玉（バブル）アニメーション --- */
    .bubbles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none; /* アプリの操作を邪魔しない */
    }

    .bubble {
      position: absolute;
      bottom: -100px;
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(14, 165, 233, 0.2); /* ほんのり青い縁取り */
      border-radius: 50%;
      box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.6), 0 4px 10px rgba(14, 165, 233, 0.05);
      animation: floatUp 12s infinite linear;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0;
      }
      10% {
        opacity: 0.8;
      }
      90% {
        opacity: 0.4;
      }
      100% {
        transform: translateY(-120vh) translateX(50px) scale(1.2);
        opacity: 0;
      }
    }

    /* バブルの個体差（サイズと位置と速度をランダム風に） */
    .bubble:nth-child(1) { left: 10%; width: 50px; height: 50px; animation-duration: 14s; animation-delay: 0s; }
    .bubble:nth-child(2) { left: 25%; width: 80px; height: 80px; animation-duration: 18s; animation-delay: 2s; }
    .bubble:nth-child(3) { left: 40%; width: 40px; height: 40px; animation-duration: 12s; animation-delay: 4s; }
    .bubble:nth-child(4) { left: 60%; width: 90px; height: 90px; animation-duration: 22s; animation-delay: 1s; }
    .bubble:nth-child(5) { left: 75%; width: 60px; height: 60px; animation-duration: 16s; animation-delay: 5s; }
    .bubble:nth-child(6) { left: 90%; width: 45px; height: 45px; animation-duration: 13s; animation-delay: 3s; }

    /* --- メインコンテナ（レスポンス対応） --- */
    .app-container {
      background: rgba(255, 255, 255, 0.85);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px); /* すりガラス効果 */
      width: 100%;
      max-width: 550px; /* パソコン表示で行が広くなりすぎないベストな幅 */
      margin-top: 40px;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(14, 165, 233, 0.08), 0 1px 3px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.7);
      z-index: 1; /* シャボン玉より前に出す */
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1e3a8a; /* 濃い青（インディゴネイビー） */
      margin-bottom: 24px;
      text-align: center;
      letter-spacing: -0.5px;
    }

    /* --- エラーバナー --- */
    .error-msg {
      background-color: #fef2f2;
      color: #ef4444;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      border: 1px solid #fee2e2;
      display: none;
    }

    /* --- フォームエリア（PC・スマホの切り替え） --- */
    form {
      display: flex;
      flex-direction: row; /* 基本は横並び */
      gap: 10px;
      margin-bottom: 24px;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 16px;
      color: #334155;
      background: #ffffff;
      transition: all 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: #3b82f6; /* フォーカス時に青に */
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); /* 濃淡の青グラデーション */
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(29, 78, 216, 0.2);
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(29, 78, 216, 0.3);
    }

    button:active {
      transform: translateY(1px);
    }

    /* --- リストエリア --- */
    ul {
      list-style: none;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: #ffffff;
      margin-bottom: 10px;
      border-radius: 12px;
      border: 1px solid #f1f5f9;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.01), 0 2px 4px -1px rgba(0, 0, 0, 0.01);
      transition: all 0.2s ease;
    }

    li:hover {
      transform: translateX(2px);
      border-color: #e2e8f0;
      box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.05);
    }

    /* タスクのテキスト */
    li span {
      color: #475569;
      font-size: 15px;
      line-height: 1.5;
      padding-right: 12px;
      word-break: break-all; /* 長い英単語の改行対策 */
    }

    /* 削除ボタン */
    .delete-btn {
      background: #f1f5f9;
      color: #64748b;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      box-shadow: none;
    }

    .delete-btn:hover {
      background: #fee2e2;
      color: #ef4444;
      box-shadow: none;
      transform: none;
    }

    /* --- 📱 スマホ画面（横幅480px以下）での調整 --- */
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      .app-container {
        margin-top: 10px;
        padding: 20px 16px;
        border-radius: 12px;
      }
      form {
        flex-direction: column; /* スマホでは縦並びに切り替え */
      }
      button {
        width: 100%; /* ボタンを横いっぱいに広げて押しやすく */
        padding: 14px; /* タップしやすいように少し厚みを出す */
      }
      h1 {
        font-size: 20px;
        margin-bottom: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="bubbles">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <div class="app-container">
    <h1>My Todo App</h1>
    <div id="error-banner" class="error-msg"></div>

    <form id="todo-form">
      <input type="text" id="todo-input" placeholder="タスクを入力..." required>
      <button type="submit">追加</button>
    </form>

    <ul id="todo-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
