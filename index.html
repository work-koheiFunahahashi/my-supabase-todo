<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Supabase Todo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1"></script>
  <style>
    /* --- 全体のリセットと背景設定 --- */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
      background: linear-gradient(135deg, #f4f7fc 0%, #eef2f9 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* --- シャボン玉アニメーション --- */
    .bubbles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .bubble {
      position: absolute;
      bottom: -120px;
      border-radius: 50%;
      box-shadow: inset 0 0 15px rgba(255,255,255,0.7), 0 5px 15px rgba(14,165,233,0.1);
      animation: floatUp 12s infinite linear;
    }

    @keyframes floatUp {
      0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0; }
      10%  { opacity: 0.9; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-130vh) translateX(60px) scale(1.3); opacity: 0; }
    }

    .bubble:nth-child(odd)  { background: rgba(14,165,233,0.7); border: 3px solid rgba(14,165,233,0.9); }
    .bubble:nth-child(even) { background: rgba(36,180,126,0.7); border: 3px solid rgba(36,180,126,0.9); }

    .bubble:nth-child(1)  { left: 5%;  width: 60px;  height: 60px;  animation-duration: 14s; animation-delay: 0s; }
    .bubble:nth-child(2)  { left: 15%; width: 100px; height: 100px; animation-duration: 19s; animation-delay: 2s; }
    .bubble:nth-child(3)  { left: 28%; width: 50px;  height: 50px;  animation-duration: 13s; animation-delay: 4s; }
    .bubble:nth-child(4)  { left: 35%; width: 110px; height: 110px; animation-duration: 23s; animation-delay: 1s; }
    .bubble:nth-child(5)  { left: 50%; width: 70px;  height: 70px;  animation-duration: 17s; animation-delay: 5s; }
    .bubble:nth-child(6)  { left: 60%; width: 55px;  height: 55px;  animation-duration: 14s; animation-delay: 3s; }
    .bubble:nth-child(7)  { left: 70%; width: 100px; height: 100px; animation-duration: 20s; animation-delay: 6s; }
    .bubble:nth-child(8)  { left: 80%; width: 85px;  height: 85px;  animation-duration: 18s; animation-delay: 1s; }
    .bubble:nth-child(9)  { left: 90%; width: 65px;  height: 65px;  animation-duration: 15s; animation-delay: 7s; }
    .bubble:nth-child(10) { left: 95%; width: 95px;  height: 95px;  animation-duration: 21s; animation-delay: 2s; }

    /* --- メインコンテナ --- */
    .app-container {
      background: rgba(255,255,255,0.85);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      width: 100%;
      max-width: 900px;
      margin: 40px auto;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(14,165,233,0.12), 0 2px 4px rgba(0,0,0,0.02);
      border: 1px solid rgba(255,255,255,0.8);
      z-index: 1;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1e3a8a;
      margin-bottom: 28px;
      text-align: center;
      letter-spacing: -0.5px;
    }

    /* --- エラーバナー --- */
    .error-msg {
      background-color: #fef2f2;
      color: #ef4444;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      border: 1px solid #fee2e2;
      display: none;
    }

    /* --- フォームエリア --- */
    form {
      display: flex;
      flex-direction: row;
      gap: 12px;
      margin-bottom: 28px;
    }

    input[type="text"] {
      flex: 1;
      padding: 14px 20px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-size: 17px;
      color: #334155;
      background: #ffffff;
      transition: all 0.2s ease;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.2);
    }

    button {
      padding: 14px 28px;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 5px 15px rgba(29,78,216,0.25);
      white-space: nowrap;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(29,78,216,0.35);
    }

    button:active {
      transform: translateY(1px);
    }

    /* --- リストエリア --- */
    ul {
      list-style: none;
    }

    /* ======================================================
       li レイアウト：テキスト部分 + ボタン部分を横並び
       ボタン部分は固定幅で右端に配置
    ====================================================== */
    li {
      display: flex;
      justify-content: space-between;
      align-items: flex-start; /* 長文があっても上揃え */
      padding: 18px 24px;
      background: #ffffff;
      margin-bottom: 12px;
      border-radius: 14px;
      border: 1px solid #f1f5f9;
      box-shadow: 0 6px 12px rgba(0,0,0,0.01), 0 2px 4px rgba(0,0,0,0.01);
      transition: all 0.2s ease;
      gap: 12px;
    }

    li:hover {
      transform: translateX(3px);
      border-color: #e2e8f0;
      box-shadow: 0 12px 20px rgba(14,165,233,0.08);
    }

    /* テキスト＋メタ情報エリア（伸縮する） */
    .task-content {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0; /* テキスト折り返しのため */
    }

    /* 登録日 */
    .task-date {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    /* タスクテキスト（折りたたみ制御） */
    .task-text {
      color: #475569;
      font-size: 16px;
      line-height: 1.6;
      word-break: break-all;
    }

    /* 折りたたみ状態：3行に省略 */
    .text-collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 展開状態 */
    .text-expanded {
      display: block;
    }

    /* 展開/折りたたみボタン */
    .toggle-btn {
      display: none;
      align-items: center;
      margin-top: 6px;
      background: none;
      border: none;
      color: #3b82f6;
      cursor: pointer;
      padding: 2px 4px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 4px;
      align-self: flex-start;
      box-shadow: none;
    }

    .toggle-btn:hover {
      background-color: #eff6ff;
      color: #1d4ed8;
      transform: none;
      box-shadow: none;
    }

    .toggle-btn .icon {
      margin-left: 3px;
      font-size: 11px;
    }

    /* インライン編集用テキストエリア（更新モード時に表示） */
    .edit-textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid #3b82f6;
      border-radius: 8px;
      font-size: 16px;
      color: #334155;
      line-height: 1.6;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .edit-textarea:focus {
      outline: none;
    }

    /* ======================================================
       ボタンエリア：固定幅・縦並び・右端固定
    ====================================================== */
    .action-btns {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      width: 80px; /* 幅を固定して位置を揃える */
    }

    /* 削除ボタン */
    .delete-btn {
      background: #f1f5f9;
      color: #64748b;
      padding: 7px 0;
      font-size: 13px;
      font-weight: 500;
      border-radius: 8px;
      box-shadow: none;
      width: 100%;
      text-align: center;
    }

    .delete-btn:hover {
      background: #fee2e2;
      color: #ef4444;
      box-shadow: none;
      transform: none;
    }

    /* 更新ボタン（通常モード） */
    .edit-btn {
      background: #f0fdf4;
      color: #16a34a;
      padding: 7px 0;
      font-size: 13px;
      font-weight: 500;
      border-radius: 8px;
      box-shadow: none;
      width: 100%;
      text-align: center;
    }

    .edit-btn:hover {
      background: #dcfce7;
      color: #15803d;
      box-shadow: none;
      transform: none;
    }

    /* 保存ボタン（編集モード） */
    .save-btn {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: white;
      padding: 7px 0;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      box-shadow: 0 3px 8px rgba(22,163,74,0.3);
      width: 100%;
      text-align: center;
    }

    .save-btn:hover {
      background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
      box-shadow: 0 5px 12px rgba(22,163,74,0.4);
      transform: translateY(-1px);
    }

    /* キャンセルボタン（編集モード） */
    .cancel-btn {
      background: #f8fafc;
      color: #64748b;
      padding: 7px 0;
      font-size: 13px;
      font-weight: 500;
      border-radius: 8px;
      box-shadow: none;
      width: 100%;
      text-align: center;
    }

    .cancel-btn:hover {
      background: #e2e8f0;
      color: #334155;
      box-shadow: none;
      transform: none;
    }

    /* --- 📱 スマホ画面（横幅480px以下）での調整 --- */
    @media (max-width: 480px) {
      body { padding: 10px; }
      .app-container {
        margin-top: 10px;
        padding: 24px 20px;
        border-radius: 12px;
      }
      form { flex-direction: column; }
      input[type="text"] { font-size: 16px; padding: 12px 18px; }
      button { width: 100%; padding: 14px; font-size: 16px; }
      h1 { font-size: 22px; margin-bottom: 22px; }
      li { padding: 14px 16px; }
      .action-btns { width: 68px; }
    }
  </style>
</head>
<body>

  <div class="bubbles">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <div class="app-container">
    <h1>My Todo App</h1>
    <div id="error-banner" class="error-msg"></div>

    <form id="todo-form">
      <input type="text" id="todo-input" placeholder="タスクを入力..." required>
      <button type="submit">追加</button>
    </form>

    <ul id="todo-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
